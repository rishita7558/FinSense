[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(\.git|\.venv|venv|build|dist|htmlcov|\.pytest_cache|\.ruff_cache|\.mypy_cache|logs|data|notebooks)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".git", ".venv", "venv", "build", "dist", "htmlcov", ".pytest_cache", ".ruff_cache", ".mypy_cache", "logs", "data", "notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "C4"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --cov=backend --cov-report=term-missing"
