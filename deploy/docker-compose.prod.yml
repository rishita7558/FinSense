services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1 || mongo --eval 'db.adminCommand({ ping: 1 })' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${GHCR_IMAGE}
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      DATABASE_NAME: armor
      COLLECTION_NAME: conversations
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      WHISPER_MODEL: base
      STREAMING_WINDOW_SIZE: 8
      API_URL: http://backend:8000
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    image: ${GHCR_IMAGE}
    restart: unless-stopped
    command: ["streamlit", "run", "frontend/dashboard.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health >/dev/null"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
