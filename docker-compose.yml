services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: .
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017
      DATABASE_NAME: armor
      COLLECTION_NAME: conversations
      REDIS_URL: redis://redis:6379/0
      WHISPER_MODEL: base
      STREAMING_WINDOW_SIZE: 8
    ports:
      - "8000:8000"
    depends_on:
      - mongo
      - redis

  frontend:
    build: .
    restart: unless-stopped
    command: ["streamlit", "run", "frontend/dashboard.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mongo_data: